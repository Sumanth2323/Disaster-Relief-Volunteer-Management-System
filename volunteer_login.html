<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Volunteer Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --green: #2a9d8f; --blue: #457b9d; }
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, var(--green) 0%, var(--blue) 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            padding: 40px 30px;
            width: 100%;
            max-width: 380px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
            text-align: center;
            animation: slideUp 0.6s ease-out;
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .icon-header { font-size: 3.5rem; color: #fff; margin-bottom: 15px; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.2)); }
        h2 { margin: 0 0 25px; font-weight: 500; }
        .error-badge {
            background: rgba(230, 57, 70, 0.8);
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .input-group { position: relative; margin-bottom: 20px; }
        .input-group i.main-icon { position: absolute; top: 50%; left: 15px; transform: translateY(-50%); color: rgba(255,255,255,0.7); transition: 0.3s; }
        .input-group input {
            width: 100%;
            padding: 15px 45px;
            box-sizing: border-box;
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 10px;
            color: white;
            font-size: 1rem;
            transition: 0.3s;
        }
        .input-group input::placeholder { color: rgba(255,255,255,0.6); }
        .input-group input:focus { background: rgba(255, 255, 255, 0.25); border-color: white; outline: none; }
        .input-group input:focus + i.main-icon { color: white; }
        
        .toggle-pwd { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); cursor: pointer; color: rgba(255,255,255,0.6); }
        .toggle-pwd:hover { color: white; }
        
        .btn-submit {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #2a9d8f, #1f7a6f);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(42, 157, 143, 0.4);
            margin-top: 10px;
        }
        .btn-submit:hover { transform: translateY(-3px); box-shadow: 0 8px 20px rgba(42, 157, 143, 0.6); }
        .back-link { display: inline-block; margin-top: 25px; color: rgba(255,255,255,0.8); text-decoration: none; font-size: 0.95rem; }
        .back-link:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="glass-card">
        <div class="icon-header"><i class="fas fa-hands-helping"></i></div>
        <h2>Volunteer Portal</h2>
        
        {% if error %}
            <div class="error-badge"><i class="fas fa-exclamation-triangle"></i> {{ error }}</div>
        {% endif %}
        
        <form method="POST" action="/volunteer_login">
            <div class="input-group">
                <input type="email" name="email" placeholder="Email Address" required>
                <i class="fas fa-envelope main-icon"></i>
            </div>
            <div class="input-group">
                <input type="password" id="pwdInput" name="password" placeholder="Password" required>
                <i class="fas fa-lock main-icon"></i>
                <i class="fas fa-eye toggle-pwd" onclick="togglePassword()" id="toggleIcon"></i>
            </div>
            <button type="submit" class="btn-submit">Login to Dashboard</button>
        </form>
        <a href="/" class="back-link"><i class="fas fa-arrow-left"></i> Return Home</a>
    </div>

    <script>
        function togglePassword() {
            const pwd = document.getElementById('pwdInput');
            const icon = document.getElementById('toggleIcon');
            if (pwd.type === 'password') {
                pwd.type = 'text';
                icon.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                pwd.type = 'password';
                icon.classList.replace('fa-eye-slash', 'fa-eye');
            }
        }
    </script>
</body>
</html>
