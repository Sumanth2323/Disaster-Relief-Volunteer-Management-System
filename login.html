<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Disaster Relief</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #1d3557; --accent: #e63946; --secondary: #457b9d; }
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, var(--primary) 0%, #2b1055 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            position: relative;
            color: white;
        }
        .bg-icons i {
            position: absolute;
            font-size: 8rem;
            color: rgba(255, 255, 255, 0.03);
            z-index: 0;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 20px;
            padding: 40px 30px;
            width: 100%;
            max-width: 380px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            z-index: 1;
            text-align: center;
            animation: fadeIn 0.8s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .glass-card h2 { margin: 10px 0 25px; font-weight: 600; letter-spacing: 1px; }
        .icon-header { font-size: 3.5rem; color: var(--accent); margin-bottom: 10px; text-shadow: 0 0 15px rgba(230,57,70,0.5); }
        .input-group { position: relative; margin-bottom: 20px; text-align: left; }
        .input-group i { position: absolute; top: 50%; left: 15px; transform: translateY(-50%); color: rgba(255,255,255,0.6); font-size: 1.1rem; transition: 0.3s; }
        .input-group input {
            width: 100%;
            padding: 15px 15px 15px 45px;
            box-sizing: border-box;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            color: white;
            font-size: 1rem;
            transition: all 0.3s;
        }
        .input-group input::placeholder { color: rgba(255,255,255,0.5); }
        .input-group input:focus {
            background: rgba(255, 255, 255, 0.15);
            border-color: var(--accent);
            outline: none;
            box-shadow: 0 0 15px rgba(230, 57, 70, 0.4);
        }
        .input-group input:focus + i { color: var(--accent); }
        .btn-submit {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, var(--accent), #b01e2b);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(230, 57, 70, 0.3);
        }
        .btn-submit:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(230, 57, 70, 0.5); }
        .back-link { display: inline-block; margin-top: 20px; color: rgba(255,255,255,0.6); text-decoration: none; font-size: 0.9rem; transition: 0.3s; }
        .back-link:hover { color: white; }
    </style>
</head>
<body>
    <div class="bg-icons">
        <i class="fas fa-ambulance" style="top: 10%; left: 15%;"></i>
        <i class="fas fa-shield-alt" style="top: 75%; left: 80%;"></i>
        <i class="fas fa-heartbeat" style="top: 30%; left: 85%;"></i>
        <i class="fas fa-hands-helping" style="top: 80%; left: 15%;"></i>
    </div>
    <div class="glass-card">
        <div class="icon-header"><i class="fas fa-user-shield"></i></div>
        <h2>Admin Login</h2>
        <form method="POST" action="/admin_login">
            <div class="input-group">
                <input type="text" name="username" placeholder="Username" required>
                <i class="fas fa-user"></i>
            </div>
            <div class="input-group">
                <input type="password" name="password" placeholder="Password" required>
                <i class="fas fa-lock"></i>
            </div>
            <button type="submit" class="btn-submit">Secure Login <i class="fas fa-arrow-right"></i></button>
        </form>
        <a href="/" class="back-link"><i class="fas fa-arrow-left"></i> Back to Home</a>
    </div>
</body>
</html>
