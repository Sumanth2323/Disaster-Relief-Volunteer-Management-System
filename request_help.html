<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Request Help - Disaster Relief</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --urgent: #e63946; --dark: #1d3557; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, var(--urgent) 0%, #8a131c 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 30px 15px;
            box-sizing: border-box;
        }
        .form-container {
            background: white;
            width: 100%;
            max-width: 550px;
            padding: 35px;
            border-radius: 16px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.4);
        }
        h2 { color: var(--urgent); text-align: center; margin-top: 0; font-size: 2rem; display: flex; justify-content: center; align-items: center; gap: 10px; }
        .alert { padding: 15px; background-color: #e5f6e5; color: #2a9d8f; border-radius: 8px; margin-bottom: 20px; font-weight: bold; text-align: center; display: flex; align-items: center; justify-content: center; gap: 10px; }
        
        label { font-weight: 700; color: var(--dark); display: block; margin-top: 20px; margin-bottom: 8px; font-size: 1.05rem; }
        input, select {
            width: 100%;
            padding: 15px;
            border: 2px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 1.1rem;
            transition: 0.3s;
            background-color: #fcfcfc;
        }
        /* Highlight urgent required fields with red border indicator */
        input:required, select:required { border-left: 5px solid var(--urgent); }
        input:focus, select:focus { border-color: var(--urgent); outline: none; background-color: white; box-shadow: 0 0 10px rgba(230,57,70,0.1); }
        
        .btn-location { background-color: var(--dark); color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; font-size: 1rem; width: 100%; margin-bottom: 15px; transition: 0.3s; display: flex; justify-content: center; align-items: center; gap: 8px; }
        .btn-location:hover { background-color: #112138; }
        
        #map { height: 250px; margin-bottom: 15px; border-radius: 8px; border: 2px solid #ddd; }
        
        .btn-submit { width: 100%; padding: 18px; background-color: var(--urgent); color: white; border: none; font-size: 1.3rem; font-weight: bold; border-radius: 8px; cursor: pointer; transition: 0.3s; margin-top: 15px; box-shadow: 0 5px 15px rgba(230,57,70,0.4); }
        .btn-submit:hover { background-color: #c9302c; transform: scale(1.02); }
        
        .back-link { display: block; text-align: center; margin-top: 20px; color: #666; text-decoration: none; font-weight: 500; }
        .back-link:hover { color: var(--dark); text-decoration: underline; }
    </style>
</head>
<body>
    <div class="form-container">
        <h2><i class="fas fa-ambulance"></i> Emergency Request</h2>
        
        <form method="POST" action="/request_help">
            <label><i class="fas fa-user"></i> Full Name</label>
            <input type="text" name="name" placeholder="Enter your full name" required>

            <label><i class="fas fa-phone-alt"></i> Phone Number</label>
            <input type="tel" name="phone" placeholder="Emergency contact number" required>

            <label><i class="fas fa-medkit"></i> Type of Help Needed</label>
            <select name="help_type" required>
                <option value="" disabled selected>Select emergency type...</option>
                <option value="Medical">Medical Aid</option>
                <option value="Food/Water">Food & Water</option>
                <option value="Shelter">Shelter</option>
                <option value="Rescue">Rescue / Evacuation</option>
            </select>

            <label><i class="fas fa-map-marker-alt"></i> Incident Location</label>
            <button type="button" class="btn-location" onclick="autoDetectLocation()"><i class="fas fa-location-arrow"></i> Auto-Detect My GPS Location</button>
            <div id="map"></div>
            
            <input type="hidden" id="latitude" name="latitude" required>
            <input type="hidden" id="longitude" name="longitude" required>

            <button type="submit" class="btn-submit">SUBMIT EMERGENCY REQUEST</button>
        </form>
        <a href="/" class="back-link"><i class="fas fa-arrow-left"></i> Back to Main Menu</a>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    {% if request.args.get('success') %}
    <script>
        document.addEventListener("DOMContentLoaded", function() {
            Swal.fire({
                toast: true,
                position: 'top-end',
                icon: 'success',
                title: '✅ Request submitted successfully!',
                text: 'Rescuers have been notified.',
                showConfirmButton: false,
                timer: 6000,
                timerProgressBar: true
            });
            window.history.replaceState({}, document.title, "/request_help");
        });
    </script>
    {% endif %}

    <script>
        var map = L.map('map').setView([12.9716, 77.5946], 13); 
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap contributors'
        }).addTo(map);

        var marker;

        function autoDetectLocation() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(function(position) {
                    var lat = position.coords.latitude;
                    var lng = position.coords.longitude;
                    map.setView([lat, lng], 15);
                    if (marker) map.removeLayer(marker);
                    marker = L.marker([lat, lng]).addTo(map);
                    document.getElementById('latitude').value = lat;
                    document.getElementById('longitude').value = lng;
                }, function(error) {
                    alert("Location access denied or unavailable. Please click on the map manually to set your coordinates.");
                });
            } else {
                alert("Geolocation is not supported by this browser.");
            }
        }

        map.on('click', function(e) {
            if (marker) map.removeLayer(marker);
            marker = L.marker(e.latlng).addTo(map);
            document.getElementById('latitude').value = e.latlng.lat;
            document.getElementById('longitude').value = e.latlng.lng;
        });
    </script>
</body>
</html>
