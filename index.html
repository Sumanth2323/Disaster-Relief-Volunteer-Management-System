<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Disaster Relief Management System</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #1d3557;
            --secondary: #e63946;
            --success: #2a9d8f;
            --bg: #f1faee;
            --text: #333;
        }
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
        }
        .navbar {
            background-color: var(--primary);
            padding: 15px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: white;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .navbar .logo { font-size: 1.5rem; font-weight: bold; }
        .navbar a {
            color: white;
            text-decoration: none;
            margin-left: 20px;
            font-weight: 500;
            transition: color 0.3s;
        }
        .navbar a:hover { color: var(--success); }
        .hero {
            background: linear-gradient(135deg, rgba(29, 53, 87, 0.9), rgba(230, 57, 70, 0.8)), url('https://images.unsplash.com/photo-1599557431688-692b6eb2d287?q=80&w=2000&auto=format&fit=crop') no-repeat center center/cover;
            height: calc(100vh - 66px);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            text-align: center;
            padding: 0 20px;
        }
        .hero h1 { font-size: 3.5rem; margin-bottom: 20px; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }
        .hero p { font-size: 1.2rem; margin-bottom: 40px; max-width: 600px; line-height: 1.6; }
        .btn {
            padding: 15px 35px;
            border-radius: 30px;
            text-decoration: none;
            font-weight: bold;
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
            font-size: 1.2rem;
        }
        .btn-danger {
            background-color: var(--secondary);
            color: white;
            box-shadow: 0 4px 15px rgba(230, 57, 70, 0.4);
        }
        .btn-danger:hover { transform: translateY(-3px); box-shadow: 0 6px 20px rgba(230, 57, 70, 0.6); }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo"><i class="fas fa-hands-helping"></i> DRMS</div>
        <div class="nav-links">
            <a href="/admin_login"><i class="fas fa-user-shield"></i> Admin</a>
            <a href="/volunteer_login"><i class="fas fa-user-check"></i> Volunteer Login</a>
        </div>
    </nav>
    <div class="hero">
        <h1>Emergency Help at Your Fingertips</h1>
        <p>A fast, reliable, and coordinated disaster response platform. We connect victims with immediate resources, volunteers, and rescue teams.</p>
        <a href="/request_help" class="btn btn-danger"><i class="fas fa-ambulance"></i> Request Help Now</a>
    </div>
</body>
</html>
